    score: 5.9
    rating: "MEDIUM"
  impact:
    technical: {loss_of_confidentiality: 1, loss_of_integrity: 2, loss_of_availability: 1, loss_of_accountability: 8}
    business: {reputation_damage: 3, financial_damage: 3, non_compliance: 4, privacy_violation: 2}
    business_impact_reasoning: "Passwort B is a group secret with no per-respondent identity and the app keeps no audit trail, so uploads cannot be attributed or proven. The repudiation itself does not disclose or corrupt data (C/I/A low), but Loss of Accountability is high. Business factors modest — no direct data breach."
