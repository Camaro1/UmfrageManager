    business: {reputation_damage: 7, financial_damage: 7, non_compliance: 8, privacy_violation: 8}
    business_impact_reasoning: "A01 C=Very High (7-9), answers may contain PII → high confidentiality/GDPR exposure. I/A rated N → low. Impact averages to MEDIUM."
