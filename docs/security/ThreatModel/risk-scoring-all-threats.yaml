# Risk Scoring Audit Trail — Umfrage-Manager
# Methodology: OWASP Risk Rating, extended with project attacker model.
# Likelihood/Impact = AVERAGE of 8 factors (0-9). Rating: 0-3 LOW, 3.1-6 MEDIUM, 6.1-9 HIGH.
# Total Risk from 3x3 matrix. Project-wide fixed values: Awareness=3, Intrusion Detection=9.
# Status: Phases 2 & 3 complete. mitigations_referenced populated (Phase 3). residual_risk carries
# explicit acceptance decisions made in this session; numeric residual scoring is a Phase 4 task.
# "RO" ratings are risk-owner determinations below the mechanical average (fixed Intrusion
# Detection=9 structurally lifts likelihood averages); see per-threat reasoning. T-04 = withdrawn.
#
# Mitigation catalog (full text in threatmodel_umfragemanager_phase3_mitigationen.html, Table 10):
#   M-01 Plattform-Nutzungsempfehlungen (Operator)            [Preventive]      T-02, T-05
#   M-02 Datensparsamkeit im Umfragedesign                    [Preventive]      T-02, T-14
#   M-03 Import-Validierung gegen Umfragedefinition [FUTURE]  [Prev./Detective] T-03, T-06, T-10
#   M-04 Client-Löschfunktionen (btn-clear-survey/-all) [IMPL] [Corrective]     T-07
#   M-05 Integritäts-/Supply-Chain-Härtung (Hash-CSP,          [Preventive]      T-08, T-09
#        kein eval, inline vendoring) [IMPLEMENTED]
#   M-06 XSS-/Injection-Schutz (textContent-Invariante,        [Preventive]      T-11, T-15
#        escapeHtml, csvSafeCell) [IMPLEMENTED]
#   M-07 Prozesskontrolle js-yaml-Neuvendoring                [Preventive]      T-09
#   M-08 Operator-Endpoint-Härtung [OUT OF SCOPE / env.]      [Preventive]      T-12, T-14

